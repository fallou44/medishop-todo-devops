##############################################
# .github/workflows/ci-backend.yml
# CI : Tests + Build + Push image Backend
# Déclenché sur push/PR vers main
##############################################

name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/backend/**"

jobs:
  # ── Test & Lint ────────────────────────────────────────────────────────────
  test:
    name: Tests Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/backend/package-lock.json

      - name: 📦 Installer les dépendances
        working-directory: app/backend
        run: npm ci

      - name: 🧪 Lancer les tests
        working-directory: app/backend
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test_medishop
          JWT_SECRET: test_secret_for_ci_only_not_production

  # ── Build & Push Docker ────────────────────────────────────────────────────
  build-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🏷️ Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/medishop-todo-back
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔨 Build et Push de l'image Backend
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          file: app/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
