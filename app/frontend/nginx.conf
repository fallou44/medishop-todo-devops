##############################################
# nginx.conf - Configuration Nginx pour SPA React
# Gère le routing côté client (React Router)
##############################################

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Cache pour les assets statiques (JS/CSS buildés avec hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Toutes les routes → index.html (SPA React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactiver les logs pour les health checks
    location /healthz {
        access_log off;
        return 200 "OK";
    }
}
