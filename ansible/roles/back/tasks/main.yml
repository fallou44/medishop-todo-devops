##############################################
# roles/back/tasks/main.yml
# Configuration de l'instance Back (API Node.js)
##############################################

---
- name: "BACK | Créer le réseau Docker"
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: "BACK | Puller l'image du conteneur Back"
  community.docker.docker_image:
    name: "{{ back_image }}:latest"
    source: pull
  ignore_errors: true

- name: "BACK | Arrêter l'ancien conteneur Back (si existant)"
  community.docker.docker_container:
    name: "{{ back_container_name }}"
    state: absent
  ignore_errors: true

- name: "BACK | Démarrer le conteneur Back (API)"
  community.docker.docker_container:
    name: "{{ back_container_name }}"
    image: "{{ back_image }}:latest"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ back_port }}:3000"
    networks:
      - name: "{{ docker_network_name }}"
    env:
      NODE_ENV: "{{ node_env }}"
      PORT: "3000"
      MONGODB_URI: "mongodb://{{ mongo_app_username }}:{{ mongo_app_password }}@{{ db_private_ip }}:{{ db_port }}/{{ mongo_db_name }}?authSource={{ mongo_db_name }}"
      JWT_SECRET: "{{ lookup('env', 'JWT_SECRET') | default('change_me_in_production') }}"
  ignore_errors: true

- name: "BACK | Vérifier que le conteneur Back est démarré"
  community.docker.docker_container_info:
    name: "{{ back_container_name }}"
  register: back_container_info
  ignore_errors: true

- name: "BACK | Afficher le statut du conteneur"
  ansible.builtin.debug:
    msg: "Conteneur Back : {{ back_container_info.container.State.Status | default('Inconnu') }}"
  ignore_errors: true
